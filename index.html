<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Technical Team Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-8 font-sans">

    <div class="flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
        <div>
            <h1 class="text-3xl font-black text-white tracking-tighter uppercase">Technical Team <span class="text-blue-500">Task Dashboard</span></h1>
            <p id="sync-status" class="text-orange-500 font-mono text-[10px] mt-1 tracking-widest uppercase italic font-bold animate-pulse">Establishing Direct Link...</p>
        </div>
        <div class="bg-slate-800 px-6 py-2 rounded-xl border border-slate-700 shadow-inner">
            <p id="clock" class="text-2xl font-mono font-bold text-blue-400">00:00:00</p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div>
            <h2 class="text-blue-400 font-bold uppercase tracking-widest text-xs mb-6 flex justify-between">
                <span>🔵 In Progress</span>
                <span id="count-progress" class="text-slate-500">0</span>
            </h2>
            <div id="col-progress" class="space-y-4"></div>
        </div>
        <div>
            <h2 class="text-orange-400 font-bold uppercase tracking-widest text-xs mb-6 flex justify-between">
                <span>⏸️ On Hold</span>
                <span id="count-hold" class="text-slate-500">0</span>
            </h2>
            <div id="col-hold" class="space-y-4"></div>
        </div>
        <div>
            <h2 class="text-emerald-400 font-bold uppercase tracking-widest text-xs mb-6 flex justify-between">
                <span>✅ Completed</span>
                <span id="count-completed" class="text-slate-500">0</span>
            </h2>
            <div id="col-completed" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOB9skN9gzlhYAYvuQmmE_Tu-s2gO-pY8LiPcpZoCWFR2sQLCeKH4Tll3QKopa2duYvf88grtvgENe/pub?gid=877598510&single=true&output=csv';

        async function updateDashboard() {
            try {
                // No proxy - direct fetch with cache buster
                const response = await fetch(`${CSV_URL}&nocache=${Date.now()}`);
                const data = await response.text();
                
                // Split rows and filter empty lines
                const rows = data.split('\n').map(row => row.split(',')).slice(1);
                
                // Clear columns
                const cols = {
                    'In Progress': { html: '', count: 0, div: 'col-progress', counter: 'count-progress' },
                    'On Hold': { html: '', count: 0, div: 'col-hold', counter: 'count-hold' },
                    'Completed': { html: '', count: 0, div: 'col-completed', counter: 'count-completed' }
                };

                rows.forEach(row => {
                    if (row.length < 3) return;
                    const no = row[0].trim();
                    const title = row[1].trim();
                    const status = row[2].trim();
                    const name = (row[3] || "Unassigned").trim();

                    if (cols[status]) {
                        cols[status].count++;
                        cols[status].html += `
                            <div class="bg-slate-800/60 border border-slate-700 p-5 rounded-2xl shadow-xl hover:border-blue-500/30 transition-all">
                                <div class="flex justify-between items-center mb-2">
                                    <span class="text-[9px] font-bold text-slate-500 uppercase">Task #${no}</span>
                                    <span class="text-[10px] text-blue-400 font-bold">${name}</span>
                                </div>
                                <h3 class="text-sm font-semibold text-slate-100">${title}</h3>
                            </div>
                        `;
                    }
                });

                // Render
                Object.keys(cols).forEach(key => {
                    document.getElementById(cols[key].div).innerHTML = cols[key].html;
                    document.getElementById(cols[key].counter).innerText = cols[key].count;
                });

                document.getElementById('sync-status').innerText = "SYSTEM LIVE • " + new Date().toLocaleTimeString();
                document.getElementById('sync-status').className = "text-green-500 font-mono text-[10px] mt-1 tracking-widest uppercase italic font-bold";

            } catch (e) {
                document.getElementById('sync-status').innerText = "LINK BUSY - RETRYING...";
            }
        }

        setInterval(updateDashboard, 15000);
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
        updateDashboard();
    </script>
</body>
</html>
