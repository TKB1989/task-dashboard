<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Team Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

        :root {
            --strateq-green: #8dc63f;
            --navy-deep: #050914;
        }

        body {
            background-color: var(--navy-deep);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* Fancy Animated Background */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(to right, rgba(255,255,255,0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(141, 198, 63, 0.05), transparent 70%);
            z-index: -1;
        }

        /* Glass Card with Hover Animation */
        .glass-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .glass-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--strateq-green);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 15px rgba(141, 198, 63, 0.2);
        }

        /* Status Pulse */
        .pulse-green {
            box-shadow: 0 0 0 0 rgba(141, 198, 63, 0.7);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            70% { box-shadow: 0 0 0 10px rgba(141, 198, 63, 0); }
            100% { box-shadow: 0 0 0 0 rgba(141, 198, 63, 0); }
        }

        .member-badge {
            font-size: 13px !important;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        /* Watermark Text */
        .watermark {
            position: fixed;
            bottom: -5%;
            right: -5%;
            font-size: 20vw;
            font-weight: 900;
            color: white;
            opacity: 0.02;
            pointer-events: none;
            z-index: -1;
            user-select: none;
        }
    </style>
</head>
<body class="text-slate-100 p-6 min-h-screen">

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>
    <div class="watermark">STRATEQ</div>

    <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 bg-slate-900/40 p-6 rounded-3xl border border-white/5">
        <div class="flex items-center gap-5">
            <div class="p-3 bg-white rounded-xl shadow-lg">
                <img src="https://www.strateqgroup.com/images/logo.png" alt="Logo" class="h-8">
            </div>
            <div>
                <h1 class="text-3xl font-bold tracking-tight">TECH OPS <span class="text-[#8dc63f]">OS</span></h1>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-[#8dc63f] pulse-green"></span>
                    <span id="sync-status" class="text-[10px] uppercase tracking-[0.2em] font-bold text-slate-400">System Nominal</span>
                </div>
            </div>
        </div>
        <div class="text-right">
            <div id="clock" class="text-5xl font-light tracking-tighter tabular-nums">00:00:00</div>
            <div class="text-[10px] uppercase tracking-widest text-[#8dc63f] font-bold">Real-time Telemetry</div>
        </div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <section>
            <div class="flex justify-between items-end mb-6 px-2">
                <h2 class="text-blue-400 font-bold uppercase tracking-widest text-sm">Active Sprints</h2>
                <span id="count-progress" class="text-3xl font-light text-blue-500">0</span>
            </div>
            <div id="col-progress" class="space-y-5"></div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-6 px-2">
                <h2 class="text-orange-400 font-bold uppercase tracking-widest text-sm">Paused / Queue</h2>
                <span id="count-hold" class="text-3xl font-light text-orange-500">0</span>
            </div>
            <div id="col-hold" class="space-y-5"></div>
        </section>

        <section>
            <div class="flex justify-between items-end mb-6 px-2">
                <h2 class="text-[#8dc63f] font-bold uppercase tracking-widest text-sm">Deployment Ready</h2>
                <span id="count-completed" class="text-3xl font-light text-[#8dc63f]">0</span>
            </div>
            <div id="col-completed" class="space-y-5"></div>
        </section>
    </main>

    <div id="remarks-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-slate-900 border border-[#8dc63f]/30 w-full max-w-lg rounded-3xl p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-[#8dc63f] font-bold uppercase tracking-widest">Internal Log</h3>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white transition-colors text-2xl">&times;</button>
            </div>
            <div id="modal-content" class="text-slate-300 font-light leading-relaxed text-lg italic"></div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOB9skN9gzlhYAYvuQmmE_Tu-s2gO-pY8LiPcpZoCWFR2sQLCeKH4Tll3QKopa2duYvf88grtvgENe/pub?gid=877598510&single=true&output=csv';

        const memberStyles = {
            "mahind": "bg-indigo-500/20 text-indigo-300 border-indigo-500/40",
            "boon": "bg-[#8dc63f]/20 text-[#8dc63f] border-[#8dc63f]/40",
            "safwan": "bg-cyan-500/20 text-cyan-300 border-cyan-500/40",
            "wai ming": "bg-purple-500/20 text-purple-300 border-purple-500/40",
            "shoma": "bg-rose-500/20 text-rose-300 border-rose-500/40",
            "azizan": "bg-amber-500/20 text-amber-300 border-amber-500/40",
            "default": "bg-slate-800 text-slate-400 border-slate-700"
        };

        function openModal(text) {
            document.getElementById('modal-content').innerText = text;
            document.getElementById('remarks-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('remarks-modal').classList.add('hidden');
        }

        async function updateDashboard() {
            try {
                const response = await fetch(`${CSV_URL}&t=${Date.now()}`);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)).slice(1);
                
                const cols = {
                    'In Progress': { html: '', count: 0, div: 'col-progress', counter: 'count-progress' },
                    'On Hold': { html: '', count: 0, div: 'col-hold', counter: 'count-hold' },
                    'Completed': { html: '', count: 0, div: 'col-completed', counter: 'count-completed' }
                };

                rows.forEach(row => {
                    if (row.length < 3) return;
                    const id = row[0].replace(/"/g, '').trim();
                    const title = row[1].replace(/"/g, '').trim();
                    const status = row[2].replace(/"/g, '').trim();
                    const rawName = (row[3] || "Unassigned").replace(/"/g, '').trim();
                    const remarks = (row[4] || "").replace(/"/g, '').trim(); 

                    const firstName = rawName.split('/')[0].trim().toLowerCase();
                    const colorStyle = memberStyles[firstName] || memberStyles["default"];

                    if (cols[status] && title) {
                        cols[status].count++;
                        
                        const commentBtn = remarks ? 
                            `<button onclick="openModal(\`${remarks.replace(/`/g, "\\`")}\`)" class="mt-4 w-full py-2 rounded-xl bg-white/5 hover:bg-[#8dc63f]/20 hover:text-[#8dc63f] transition-all border border-white/10 text-[10px] uppercase tracking-widest font-bold">View Comms</button>` : '';

                        cols[status].html += `
                            <div class="glass-card p-6 rounded-3xl group">
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-[10px] font-bold text-slate-500 tracking-[0.2em]">ID_${id}</span>
                                    <span class="member-badge px-3 py-1 rounded-lg border font-medium ${colorStyle}">${rawName}</span>
                                </div>
                                <h3 class="text-lg font-medium text-white group-hover:text-[#8dc63f] transition-colors leading-snug">${title}</h3>
                                ${commentBtn}
                            </div>
                        `;
                    }
                });

                Object.keys(cols).forEach(key => {
                    document.getElementById(cols[key].div).innerHTML = cols[key].html || '<div class="opacity-20 text-center py-10">NO DATA</div>';
                    document.getElementById(cols[key].counter).innerText = cols[key].count;
                });

                document.getElementById('sync-status').innerText = "Last Sync: " + new Date().toLocaleTimeString();
            } catch (e) {
                console.error(e);
            }
        }

        setInterval(updateDashboard, 15000);
        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); 
        }, 1000);
        updateDashboard();
    </script>
</body>
</html>
