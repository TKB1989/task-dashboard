<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Team Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');

        .strateq-navy { background-color: #0b1120; }
        .strateq-green { color: #8dc63f; }
        .bg-strateq-green { background-color: #8dc63f; }
        
        /* Interactive Glass Card */
        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            animation: cardEntrance 0.6s ease-out backwards;
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(141, 198, 63, 0.5);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Progress Card Subtle Glow */
        .prog-glow {
            position: relative;
        }
        .prog-glow::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            box-shadow: 0 0 15px rgba(141, 198, 63, 0.1);
            animation: breathe 3s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* Background Layers */
        .bg-grid-layer {
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 30px 30px;
            z-index: -1;
        }

        .watermark-layer {
            position: fixed;
            bottom: -50px;
            right: -50px;
            width: 500px;
            height: 300px;
            background-image: url("https://www.strateqgroup.com/images/logo.png");
            background-repeat: no-repeat;
            background-position: bottom right;
            background-size: contain;
            opacity: 0.05;
            z-index: -1;
            filter: grayscale(1);
        }

        .pulse-dot {
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(141, 198, 63, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(141, 198, 63, 0); }
            100% { box-shadow: 0 0 0 0 rgba(141, 198, 63, 0); }
        }
        
        .clock-font { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="strateq-navy text-slate-100 p-8 font-sans min-h-screen selection:bg-[#8dc63f] selection:text-black">

    <div class="bg-grid-layer"></div>
    <div class="watermark-layer"></div>

    <div class="relative z-10 flex flex-col md:flex-row justify-between items-center mb-12 border-b border-white/5 pb-10 gap-6">
        <div>
            <div class="flex items-center gap-3 mb-1">
                 <img src="https://www.strateqgroup.com/images/logo.png" class="h-6 opacity-80">
                 <div class="h-4 w-[1px] bg-slate-700"></div>
                 <h1 class="text-3xl font-black text-white tracking-tighter uppercase">
                    TECH <span class="strateq-green">OPS</span>
                </h1>
            </div>
            <div class="flex items-center gap-2">
                <div id="status-dot" class="h-2 w-2 rounded-full bg-green-500 pulse-dot"></div>
                <p id="sync-status" class="strateq-green font-mono text-[9px] tracking-[0.3em] uppercase font-bold">Terminal Active</p>
            </div>
        </div>
        <div class="bg-slate-900/40 px-12 py-5 rounded-[2rem] border border-white/5 shadow-inner backdrop-blur-xl">
            <p id="clock" class="text-5xl clock-font font-bold text-white tabular-nums leading-none tracking-tighter">00:00:00</p>
        </div>
    </div>

    <div class="relative z-10 grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="group">
            <h2 class="flex justify-between items-center bg-blue-500/5 p-5 rounded-2xl border border-blue-500/20 mb-6 transition-all group-hover:bg-blue-500/10">
                <span class="text-blue-400 font-bold uppercase tracking-widest text-[10px]">Active Sprints</span>
                <span id="count-progress" class="text-2xl font-light text-blue-500">0</span>
            </h2>
            <div id="col-progress" class="space-y-4"></div>
        </div>
        
        <div class="group">
            <h2 class="flex justify-between items-center bg-orange-500/5 p-5 rounded-2xl border border-orange-500/20 mb-6 transition-all group-hover:bg-orange-500/10">
                <span class="text-orange-400 font-bold uppercase tracking-widest text-[10px]">On Hold / Queue</span>
                <span id="count-hold" class="text-2xl font-light text-orange-500">0</span>
            </h2>
            <div id="col-hold" class="space-y-4"></div>
        </div>

        <div class="group">
            <h2 class="flex justify-between items-center bg-strateq-green/5 p-5 rounded-2xl border border-strateq-green/20 mb-6 transition-all group-hover:bg-strateq-green/10">
                <span class="strateq-green font-bold uppercase tracking-widest text-[10px]">Closed Tasks</span>
                <span id="count-completed" class="text-2xl font-light strateq-green">0</span>
            </h2>
            <div id="col-completed" class="space-y-4"></div>
        </div>
    </div>

    <div id="remarks-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/90 backdrop-blur-xl transition-all">
        <div class="bg-slate-900 border border-white/10 w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl scale-95 animate-[modalIn_0.3s_ease-out_forwards]">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-[#8dc63f] font-bold uppercase tracking-[0.2em] text-[10px]">Task Intelligence</h2>
                <button onclick="closeModal()" class="h-8 w-8 rounded-full bg-white/5 flex items-center justify-center text-slate-400 hover:text-white hover:bg-white/10 transition-all">&times;</button>
            </div>
            <p id="modal-content" class="text-slate-300 text-lg font-light leading-relaxed italic"></p>
        </div>
    </div>

    <style>
        @keyframes modalIn { to { transform: scale(1); opacity: 1; } }
    </style>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOB9skN9gzlhYAYvuQmmE_Tu-s2gO-pY8LiPcpZoCWFR2sQLCeKH4Tll3QKopa2duYvf88grtvgENe/pub?gid=877598510&single=true&output=csv';

        const memberStyles = {
            "mahind": "bg-indigo-500/10 text-indigo-300 border-indigo-500/30",
            "boon": "bg-[#8dc63f]/10 text-[#8dc63f] border-[#8dc63f]/30",
            "safwan": "bg-cyan-500/10 text-cyan-300 border-cyan-500/30",
            "wai ming": "bg-purple-500/10 text-purple-300 border-purple-500/30",
            "shoma": "bg-rose-500/10 text-rose-300 border-rose-500/30",
            "azizan": "bg-amber-500/10 text-amber-300 border-amber-500/30",
            "default": "bg-slate-800/40 text-slate-400 border-slate-700/50"
        };

        function openModal(text) {
            if(!text || text.trim() === "") return;
            document.getElementById('modal-content').innerText = text;
            document.getElementById('remarks-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('remarks-modal').classList.add('hidden');
        }

        async function updateDashboard() {
            try {
                const response = await fetch(`${CSV_URL}&t=${Date.now()}`);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)).slice(1);
                
                const cols = {
                    'In Progress': { html: '', count: 0, div: 'col-progress', counter: 'count-progress', glow: 'prog-glow' },
                    'On Hold': { html: '', count: 0, div: 'col-hold', counter: 'count-hold', glow: '' },
                    'Completed': { html: '', count: 0, div: 'col-completed', counter: 'count-completed', glow: '' }
                };

                rows.forEach((row, index) => {
                    if (row.length < 3) return;
                    const id = row[0].replace(/"/g, '').trim();
                    const title = row[1].replace(/"/g, '').trim();
                    const status = row[2].replace(/"/g, '').trim();
                    const rawName = (row[3] || "Unassigned").replace(/"/g, '').trim();
                    const remarks = (row[4] || "").replace(/"/g, '').trim(); 

                    const firstName = rawName.split('/')[0].trim().toLowerCase();
                    const colorStyle = memberStyles[firstName] || memberStyles["default"];

                    if (cols[status] && title) {
                        cols[status].count++;
                        
                        const commentBtn = remarks ? 
                            `<button onclick="openModal(\`${remarks.replace(/`/g, "\\`")}\`)" class="mt-4 w-full text-[9px] bg-white/5 hover:bg-[#8dc63f]/20 hover:text-[#8dc63f] text-slate-400 py-3 rounded-2xl border border-white/5 transition-all font-bold uppercase tracking-[0.2em]">View Log Entry</button>` : '';

                        // Staggered animation delay
                        const delay = (index % 10) * 0.05;

                        cols[status].html += `
                            <div class="glass-card p-6 rounded-[2rem] ${cols[status].glow}" style="animation-delay: ${delay}s">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="font-mono text-[10px] text-slate-500 tracking-tighter">#${id}</span>
                                    <span class="px-3 py-1 rounded-full border text-[10px] font-bold uppercase tracking-wider ${colorStyle}">
                                        ${rawName}
                                    </span>
                                </div>
                                <h3 class="text-[15px] font-bold text-white/90 leading-snug">${title}</h3>
                                ${commentBtn}
                            </div>
                        `;
                    }
                });

                Object.keys(cols).forEach(key => {
                    document.getElementById(cols[key].div).innerHTML = cols[key].html || '<p class="text-slate-800 text-center py-10 tracking-widest text-[10px]">VOID</p>';
                    document.getElementById(cols[key].counter).innerText = cols[key].count;
                });

                document.getElementById('sync-status').innerText = "SYSTEM REFRESHED: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('sync-status').innerText = "RE-ESTABLISHING LINK...";
            }
        }

        setInterval(updateDashboard, 15000);
        setInterval(() => { 
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB', { hour12: false }); 
        }, 1000);
        updateDashboard();
    </script>
</body>
</html>
