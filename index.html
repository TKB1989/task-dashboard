<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Team Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .strateq-navy { background-color: #0b1120; }
        .strateq-green { color: #8dc63f; }
        .bg-strateq-green { background-color: #8dc63f; }
        
        /* 1. THE FANCY SLIME TITLE - High Visibility */
        .slime-title {
            font-family: 'Creepster', system-ui;
            font-size: 3.5rem;
            color: #a3ff00; /* Bright Slime Green */
            text-shadow: 
                3px 3px 0px #000, 
                0 0 20px rgba(163, 255, 0, 0.6);
            filter: url('#goo');
            line-height: 1.2;
        }

        /* 2. ORIGINAL CARD DESIGN (From your first image) */
        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            z-index: 10;
            overflow: hidden;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        .glass-card:hover { transform: translateY(-2px); border-color: rgba(141, 198, 63, 0.4); }

        /* 3. ORIGINAL GRID & FIREWORKS */
        .bg-grid-layer {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(to right, rgba(255,255,255,0.01) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.01) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        #fw-canvas {
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            opacity: 0.4;
        }

        /* 4. FLOATING GHOST (Subtle addition) */
        .ghost {
            position: fixed;
            width: 60px;
            opacity: 0.1;
            z-index: -1;
            animation: float 12s infinite ease-in-out;
            pointer-events: none;
        }
        @keyframes float {
            0% { transform: translate(-10vw, 20vh); }
            50% { transform: translate(110vw, 40vh); }
            100% { transform: translate(-10vw, 60vh); }
        }

        #remarks-modal.hidden { display: none !important; }
        .member-badge { font-size: 14px !important; letter-spacing: 0.05em; }
    </style>
</head>
<body class="strateq-navy text-slate-100 p-8 font-sans min-h-screen">

    <canvas id="fw-canvas"></canvas>
    <div class="bg-grid-layer"></div>
    <div class="ghost"><svg viewBox="0 0 119 137" fill="white"><path d="M59.61,0C26.69,0,0,26.69,0,59.61v77.81l14.9-14.9,14.9,14.9,14.9-14.9,14.9,14.9,14.9-14.9,14.9,14.9,14.9-14.9,14.9,14.9V59.61C119.22,26.69,92.53,0,59.61,0ZM37.26,63.34c-4.11,0-7.45-3.34-7.45-7.45s3.34-7.45,7.45-7.45,7.45,3.34,7.45,7.45-3.34,7.45-7.45,7.45Zm44.71,0c-4.11,0-7.45-3.34-7.45-7.45s3.34-7.45,7.45-7.45,7.45,3.34,7.45,7.45-3.34,7.45-7.45,7.45Z"/></svg></div>

    <div class="relative z-10 flex flex-col md:flex-row justify-between items-center mb-10 border-b border-slate-800 pb-8 gap-6">
        <div>
            <h1 class="slime-title uppercase tracking-tighter">
                Technical Team Dashboard
            </h1>
            <div class="flex items-center gap-2 mt-2">
                <div class="h-2.5 w-2.5 rounded-full bg-green-500 animate-pulse"></div>
                <p id="sync-status" class="strateq-green font-mono text-[10px] tracking-widest uppercase font-bold italic">System Active</p>
            </div>
        </div>
        <div class="bg-slate-900/80 px-10 py-4 rounded-3xl border border-slate-800 shadow-2xl backdrop-blur-md">
            <p id="clock" class="text-4xl font-mono font-bold text-white tabular-nums leading-none">00:00:00</p>
        </div>
    </div>

    <div class="relative z-10 grid grid-cols-1 md:grid-cols-3 gap-10">
        <div>
            <h2 class="flex justify-between items-center bg-blue-500/10 p-4 rounded-2xl border-l-4 border-blue-500 mb-6 uppercase text-xs font-black">
                <span class="text-blue-400 tracking
