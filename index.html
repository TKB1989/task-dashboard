<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Team Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .strateq-navy { background-color: #0b1120; }
        .strateq-green { color: #8dc63f; }
        .bg-strateq-green { background-color: #8dc63f; }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            z-index: 10;
            overflow: hidden;
            transition: transform 0.25s cubic-bezier(.34,1.56,.64,1), border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .glass-card::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.06), transparent);
            transform: skewX(-25deg);
            transition: 0.6s;
        }
        .glass-card:hover::before { left: 150%; }
        .glass-card:hover {
            transform: translateY(-4px) scale(1.01);
            border-color: rgba(141,198,63,0.45);
            box-shadow: 0 12px 40px rgba(141,198,63,0.1);
        }

        #remarks-modal.hidden { display: none !important; }
        .member-badge { font-size: 13px !important; letter-spacing: 0.05em; }
        .task-id-label { font-size: 10px !important; }

        .bg-grid-layer {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(to right, rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1; pointer-events: none;
        }

        #fw-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2; pointer-events: none; opacity: 0.45;
        }

        .pulse-dot { animation: pulse-green 2s infinite; }
        @keyframes pulse-green {
            0%   { box-shadow: 0 0 0 0   rgba(141,198,63,0.5); }
            70%  { box-shadow: 0 0 0 8px rgba(141,198,63,0); }
            100% { box-shadow: 0 0 0 0   rgba(141,198,63,0); }
        }

        /* Stats bar */
        .stat-card {
            background: rgba(30,41,59,0.5);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 14px 20px;
            text-align: center;
            transition: border-color 0.2s, transform 0.2s;
        }
        .stat-card:hover { border-color: rgba(141,198,63,0.3); transform: translateY(-2px); }

        /* Column thin progress bar */
        .col-bar-track {
            height: 3px; border-radius: 99px;
            background: rgba(255,255,255,0.06);
            margin: -14px 0 18px 0; overflow: hidden;
        }
        .col-bar-fill { height: 100%; border-radius: 99px; transition: width 0.7s ease; }

        /* Scrollable columns */
        .col-scroll {
            max-height: calc(100vh - 380px);
            overflow-y: auto;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: rgba(141,198,63,0.25) transparent;
        }
        .col-scroll::-webkit-scrollbar { width: 3px; }
        .col-scroll::-webkit-scrollbar-thumb { background: rgba(141,198,63,0.25); border-radius: 99px; }

        /* Overall progress */
        .overall-track {
            height: 5px; border-radius: 99px;
            background: rgba(255,255,255,0.06); overflow: hidden;
        }
        .overall-fill {
            height: 100%; border-radius: 99px;
            background: linear-gradient(90deg, #5b9e1a, #8dc63f, #b5e655);
            background-size: 200% 100%;
            transition: width 0.8s ease;
            animation: shimmer 2.5s linear infinite;
        }
        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Countdown ring */
        #countdown-circle { transition: stroke-dashoffset 1s linear; }

        /* Empty state */
        .empty-state {
            display: flex; flex-direction: column; align-items: center;
            padding: 36px 16px; gap: 8px; opacity: 0.3;
        }

        /* Modal */
        #remarks-modal > div {
            animation: modalPop 0.18s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes modalPop {
            from { transform: scale(0.92); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        /* Card entrance */
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .card-animate { animation: cardIn 0.3s ease forwards; }
    </style>
</head>
<body class="strateq-navy text-slate-100 p-6 md:p-8 font-sans min-h-screen">

<canvas id="fw-canvas"></canvas>
<div class="bg-grid-layer"></div>

<!-- HEADER -->
<div class="relative z-10 flex flex-col md:flex-row justify-between items-center mb-6 border-b border-slate-800 pb-6 gap-4">
    <div>
        <h1 class="text-4xl font-black text-white tracking-tighter uppercase">
            Technical Team <span class="strateq-green">Dashboard</span>
        </h1>
        <div class="flex items-center gap-2 mt-2">
            <div class="h-2.5 w-2.5 rounded-full bg-green-500 pulse-dot"></div>
            <p id="sync-status" class="strateq-green font-mono text-[10px] tracking-widest uppercase font-bold italic">System Active</p>
        </div>
    </div>

    <div class="flex items-center gap-5">
        <!-- Countdown ring -->
        <div class="flex flex-col items-center gap-1">
            <div class="relative w-12 h-12">
                <svg viewBox="0 0 40 40" class="w-12 h-12">
                    <circle cx="20" cy="20" r="17" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
                    <circle id="countdown-circle" cx="20" cy="20" r="17" fill="none"
                        stroke="#8dc63f" stroke-width="3"
                        stroke-dasharray="106.8" stroke-dashoffset="0"
                        transform="rotate(-90 20 20)"/>
                </svg>
                <span id="countdown-text" class="absolute inset-0 flex items-center justify-center text-[11px] font-mono font-bold text-slate-300">15</span>
            </div>
            <span class="text-[9px] text-slate-600 uppercase tracking-widest">sync</span>
        </div>

        <!-- Clock -->
        <div class="bg-slate-900/80 px-10 py-4 rounded-3xl border border-slate-800 shadow-2xl backdrop-blur-md">
            <p id="clock" class="text-4xl font-mono font-bold text-white tabular-nums leading-none">00:00:00</p>
        </div>
    </div>
</div>

<!-- STATS BAR -->
<div class="relative z-10 grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
    <div class="stat-card">
        <p class="text-[10px] text-slate-500 uppercase tracking-widest mb-1">Total Tasks</p>
        <p id="stat-total" class="text-3xl font-black text-white">0</p>
    </div>
    <div class="stat-card">
        <p class="text-[10px] text-blue-500/70 uppercase tracking-widest mb-1">In Progress</p>
        <p id="stat-progress" class="text-3xl font-black text-blue-400">0</p>
    </div>
    <div class="stat-card">
        <p class="text-[10px] text-orange-500/70 uppercase tracking-widest mb-1">On Hold</p>
        <p id="stat-hold" class="text-3xl font-black text-orange-400">0</p>
    </div>
    <div class="stat-card">
        <p class="text-[10px] text-[#8dc63f]/70 uppercase tracking-widest mb-1">Done Rate</p>
        <p id="stat-rate" class="text-3xl font-black strateq-green">0%</p>
    </div>
</div>

<!-- OVERALL PROGRESS -->
<div class="relative z-10 mb-8">
    <div class="flex justify-between text-[10px] text-slate-600 uppercase tracking-widest mb-2">
        <span>Overall Completion</span>
        <span id="overall-pct" class="strateq-green font-bold">0%</span>
    </div>
    <div class="overall-track">
        <div id="overall-bar" class="overall-fill" style="width:0%"></div>
    </div>
</div>

<!-- COLUMNS -->
<div class="relative z-10 grid grid-cols-1 md:grid-cols-3 gap-8">

    <!-- In Progress -->
    <div>
        <h2 class="flex justify-between items-center bg-blue-500/10 p-4 rounded-2xl border-l-4 border-blue-500 mb-2 uppercase text-xs font-black">
            <span class="text-blue-400 tracking-widest">In Progress</span>
            <span id="count-progress" class="bg-blue-600 text-white px-3 py-0.5 rounded-full shadow-lg shadow-blue-900/50">0</span>
        </h2>
        <div class="col-bar-track"><div id="bar-progress" class="col-bar-fill bg-blue-500" style="width:0%"></div></div>
        <div id="col-progress" class="col-scroll space-y-3"></div>
    </div>

    <!-- On Hold -->
    <div>
        <h2 class="flex justify-between items-center bg-orange-500/10 p-4 rounded-2xl border-l-4 border-orange-500 mb-2 uppercase text-xs font-black">
            <span class="text-orange-400 tracking-widest">On Hold</span>
            <span id="count-hold" class="bg-orange-600 text-white px-3 py-0.5 rounded-full shadow-lg shadow-orange-900/50">0</span>
        </h2>
        <div class="col-bar-track"><div id="bar-hold" class="col-bar-fill bg-orange-500" style="width:0%"></div></div>
        <div id="col-hold" class="col-scroll space-y-3"></div>
    </div>

    <!-- Completed -->
    <div>
        <h2 class="flex justify-between items-center bg-[#8dc63f]/10 p-4 rounded-2xl border-l-4 border-[#8dc63f] mb-2 uppercase text-xs font-black">
            <span class="strateq-green tracking-widest">Completed</span>
            <span id="count-completed" class="bg-strateq-green text-white px-3 py-0.5 rounded-full shadow-lg shadow-green-900/50">0</span>
        </h2>
        <div class="col-bar-track"><div id="bar-completed" class="col-bar-fill bg-strateq-green" style="width:0%"></div></div>
        <div id="col-completed" class="col-scroll space-y-3"></div>
    </div>
</div>

<!-- MODAL -->
<div id="remarks-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
    <div class="bg-slate-800 border border-slate-700 w-full max-w-md rounded-2xl p-6 shadow-2xl">
        <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-3">
            <h2 class="text-[#8dc63f] font-bold uppercase tracking-widest text-sm">💬 Task Comments</h2>
            <button onclick="closeModal()" class="text-slate-400 hover:text-white text-3xl leading-none transition-colors">&times;</button>
        </div>
        <p id="modal-content" class="text-slate-200 text-sm leading-relaxed whitespace-pre-wrap py-2"></p>
    </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOB9skN9gzlhYAYvuQmmE_Tu-s2gO-pY8LiPcpZoCWFR2sQLCeKH4Tll3QKopa2duYvf88grtvgENe/pub?gid=877598510&single=true&output=csv';

const memberStyles = {
    "mahind":   "bg-indigo-500/20 text-indigo-300 border-indigo-500/50",
    "boon":     "bg-[#8dc63f]/20 text-[#8dc63f] border-[#8dc63f]/50",
    "safwan":   "bg-cyan-500/20 text-cyan-300 border-cyan-500/50",
    "wai ming": "bg-purple-500/20 text-purple-300 border-purple-500/50",
    "shoma":    "bg-rose-500/20 text-rose-300 border-rose-500/50",
    "azizan":   "bg-amber-500/20 text-amber-300 border-amber-500/50",
    "default":  "bg-slate-800 text-slate-400 border-slate-700"
};

// Modal
function openModal(text) {
    if (!text || !text.trim()) return;
    document.getElementById('modal-content').innerText = text;
    document.getElementById('remarks-modal').classList.remove('hidden');
}
function closeModal() { document.getElementById('remarks-modal').classList.add('hidden'); }

// Close on backdrop click
document.getElementById('remarks-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// Close on Esc
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// Empty state SVG
function emptyState(label) {
    return `<div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <rect x="6" y="10" width="28" height="22" rx="4" stroke="#8dc63f" stroke-width="1.5" stroke-dasharray="3 2"/>
            <line x1="12" y1="17" x2="28" y2="17" stroke="#8dc63f" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="12" y1="22" x2="22" y2="22" stroke="#8dc63f" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p class="text-xs text-slate-600 uppercase tracking-widest">No ${label} tasks</p>
    </div>`;
}

// Countdown
let countdown = 15;
const totalDash = 106.8;
const circle = document.getElementById('countdown-circle');
const countdownText = document.getElementById('countdown-text');

function tickCountdown() {
    countdown--;
    if (countdown < 0) countdown = 14;
    const offset = totalDash * (1 - countdown / 15);
    circle.style.strokeDashoffset = offset;
    countdownText.innerText = countdown;
}

// Dashboard update
async function updateDashboard() {
    try {
        const response = await fetch(`${CSV_URL}&t=${Date.now()}`);
        const data = await response.text();
        const rows = data.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)).slice(1);

        const cols = {
            'In Progress': { html: '', count: 0, div: 'col-progress', counter: 'count-progress', bar: 'bar-progress' },
            'On Hold':     { html: '', count: 0, div: 'col-hold',     counter: 'count-hold',     bar: 'bar-hold' },
            'Completed':   { html: '', count: 0, div: 'col-completed',counter: 'count-completed',bar: 'bar-completed' }
        };

        rows.forEach((row, idx) => {
            if (row.length < 3) return;
            const id      = row[0].replace(/"/g,'').trim();
            const title   = row[1].replace(/"/g,'').trim();
            const status  = row[2].replace(/"/g,'').trim();
            const rawName = (row[3] || "Unassigned").replace(/"/g,'').trim();
            const remarks = (row[4] || "").replace(/"/g,'').trim();

            const firstName  = rawName.split('/')[0].trim().toLowerCase();
            const colorStyle = memberStyles[firstName] || memberStyles["default"];

            if (cols[status] && title) {
                cols[status].count++;
                const delay = cols[status].count * 60;
                const commentBtn = remarks
                    ? `<button onclick="openModal(\`${remarks.replace(/`/g,"\\`")}\`)"
                        class="mt-3 w-full text-[11px] bg-slate-800/80 hover:bg-slate-700 active:scale-95 text-[#8dc63f] py-2 rounded-lg border border-slate-700 transition-all font-bold uppercase tracking-wider">
                        💬 View Comment
                      </button>` : '';

                const completedStyle = status === 'Completed'
                    ? 'border-l-2 border-[#8dc63f]/40' : 'border-l-2 border-slate-700';

                cols[status].html += `
                    <div class="glass-card p-5 rounded-2xl shadow-xl ${completedStyle} card-animate"
                         style="animation-delay:${delay}ms; animation-fill-mode:both;">
                        <div class="flex justify-between items-start mb-3">
                            <span class="task-id-label font-black text-slate-600 uppercase tracking-widest">TASK · ${id}</span>
                            <span class="member-badge font-bold px-3 py-1 rounded-full border shadow-md uppercase ${colorStyle}">${rawName}</span>
                        </div>
                        <h3 class="text-[15px] font-bold text-white leading-snug ${status === 'Completed' ? 'line-through text-slate-400' : ''}">${title}</h3>
                        ${commentBtn}
                    </div>`;
            }
        });

        const total     = cols['In Progress'].count + cols['On Hold'].count + cols['Completed'].count;
        const doneCount = cols['Completed'].count;
        const pct       = total > 0 ? Math.round(doneCount / total * 100) : 0;

        // Update columns
        Object.keys(cols).forEach(key => {
            const c = cols[key];
            document.getElementById(c.div).innerHTML = c.html || emptyState(key);
            document.getElementById(c.counter).innerText = c.count;
            const barPct = total > 0 ? Math.round(c.count / total * 100) : 0;
            document.getElementById(c.bar).style.width = barPct + '%';
        });

        // Stats
        document.getElementById('stat-total').innerText    = total;
        document.getElementById('stat-progress').innerText = cols['In Progress'].count;
        document.getElementById('stat-hold').innerText     = cols['On Hold'].count;
        document.getElementById('stat-rate').innerText     = pct + '%';
        document.getElementById('overall-bar').style.width = pct + '%';
        document.getElementById('overall-pct').innerText   = pct + '%';

        document.getElementById('sync-status').innerText = 'LIVE · ' + new Date().toLocaleTimeString();
        countdown = 15;
    } catch(e) {
        document.getElementById('sync-status').innerText = 'RECONNECTING...';
    }
}

// Timers
setInterval(updateDashboard, 15000);
setInterval(tickCountdown, 1000);
setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
updateDashboard();
</script>

<!-- FIREWORKS -->
<script>
const canvas = document.getElementById('fw-canvas');
const ctx    = canvas.getContext('2d');
let particles = [];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

class Particle {
    constructor(x, y, color, type = 'spark') {
        this.x = x; this.y = y; this.color = color; this.type = type;
        const speed = type === 'trail' ? Math.random() * 2 : (Math.random() * 5 + 1);
        const angle = Math.random() * Math.PI * 2;
        this.velX  = Math.cos(angle) * speed;
        this.velY  = Math.sin(angle) * speed;
        this.alpha = 1;
        this.size  = type === 'trail' ? Math.random() * 1.5 + 0.5 : Math.random() * 2.5 + 1;
        this.decay = type === 'trail' ? Math.random() * 0.04 + 0.03 : Math.random() * 0.018 + 0.008;
    }
    update() {
        this.x    += this.velX;
        this.y    += this.velY;
        this.velY += 0.04;
        this.velX *= 0.99;
        this.alpha -= this.decay;
    }
    draw() {
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.fillStyle   = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

// Trailing rocket
class Rocket {
    constructor() { this.reset(); }
    reset() {
        this.x     = Math.random() * canvas.width;
        this.y     = canvas.height;
        this.tx    = Math.random() * canvas.width;
        this.ty    = Math.random() * canvas.height * 0.5;
        const dx   = this.tx - this.x;
        const dy   = this.ty - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        this.vx    = (dx / dist) * 8;
        this.vy    = (dy / dist) * 8;
        this.alive = true;
        const cols = ['#8dc63f','#3b82f6','#f97316','#ffffff','#a78bfa'];
        this.color = cols[Math.floor(Math.random() * cols.length)];
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        particles.push(new Particle(this.x, this.y, this.color, 'trail'));
        const dx = this.tx - this.x, dy = this.ty - this.y;
        if (Math.sqrt(dx*dx + dy*dy) < 12) { burst(this.x, this.y, this.color); this.alive = false; }
    }
}

function burst(x, y, color) {
    const count = 50 + Math.floor(Math.random() * 30);
    for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color, 'spark'));
    // Ring burst
    const ring = ['#ffffff', color];
    for (let i = 0; i < 12; i++) {
        const p = new Particle(x, y, ring[i % 2], 'spark');
        const a = (Math.PI * 2 / 12) * i;
        p.velX = Math.cos(a) * 4; p.velY = Math.sin(a) * 4;
        particles.push(p);
    }
}

let rockets = [];
let frameCount = 0;

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frameCount++;

    // Launch rockets periodically
    if (frameCount % 90 === 0) {
        rockets.push(new Rocket());
    }

    rockets = rockets.filter(r => r.alive);
    rockets.forEach(r => r.update());

    particles = particles.filter(p => p.alpha > 0);
    particles.forEach(p => { p.update(); p.draw(); });

    ctx.globalAlpha = 1;
    requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
