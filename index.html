<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Strateq Technical Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        /* Strateq Brand Colors */
        .strateq-green { color: #8dc63f; }
        .bg-strateq-green { background-color: #8dc63f; }
        .border-strateq-green { border-color: #8dc63f; }
    </style>
</head>
<body class="bg-[#0b1120] text-slate-100 p-8 font-sans">

    <div class="flex flex-col md:flex-row justify-between items-center mb-12 border-b border-slate-800 pb-8 gap-6">
        <div class="flex items-center gap-6">
            <div class="bg-white p-2 rounded-lg shadow-xl flex items-center justify-center">
                <svg width="140" height="45" viewBox="0 0 250 80" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10 60 L30 15 L55 15 L75 60 Z" fill="#8dc63f"/> <text x="85" y="55" font-family="Arial, sans-serif" font-weight="900" font-size="42" fill="#1e293b">STRATEQ</text>
                </svg>
            </div>
            
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter uppercase leading-none">
                    Technical <span class="strateq-green">Team</span>
                </h1>
                <div class="flex items-center gap-2 mt-2">
                    <div id="status-dot" class="h-2 w-2 rounded-full bg-green-500 shadow-[0_0_8px_#8dc63f]"></div>
                    <p id="sync-status" class="strateq-green font-mono text-[10px] tracking-widest uppercase font-bold italic">System Live</p>
                </div>
            </div>
        </div>

        <div class="bg-slate-900/80 px-10 py-4 rounded-2xl border border-slate-800 shadow-2xl text-center md:text-right min-w-[240px]">
            <p id="clock" class="text-4xl font-mono font-bold text-white tabular-nums leading-none">00:00:00</p>
            <p class="text-[10px] text-slate-500 mt-2 uppercase tracking-[0.3em] font-black">Operations Feed</p>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div class="space-y-6">
            <h2 class="flex justify-between items-center bg-blue-500/10 p-3 rounded-xl border-l-4 border-blue-500">
                <span class="text-blue-400 font-black uppercase tracking-widest text-xs">In Progress</span>
                <span id="count-progress" class="bg-blue-600 text-white px-3 py-0.5 rounded-full text-[10px] font-bold">0</span>
            </h2>
            <div id="col-progress" class="space-y-4"></div>
        </div>

        <div class="space-y-6">
            <h2 class="flex justify-between items-center bg-orange-500/10 p-3 rounded-xl border-l-4 border-orange-500">
                <span class="text-orange-400 font-black uppercase tracking-widest text-xs">⏸︎ On Hold</span>
                <span id="count-hold" class="bg-orange-600 text-white px-3 py-0.5 rounded-full text-[10px] font-bold">0</span>
            </h2>
            <div id="col-hold" class="space-y-4"></div>
        </div>

        <div class="space-y-6">
            <h2 class="flex justify-between items-center bg-strateq-green/10 p-3 rounded-xl border-l-4 border-strateq-green">
                <span class="strateq-green font-black uppercase tracking-widest text-xs">✓ Completed</span>
                <span id="count-completed" class="bg-strateq-green text-white px-3 py-0.5 rounded-full text-[10px] font-bold">0</span>
            </h2>
            <div id="col-completed" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTOB9skN9gzlhYAYvuQmmE_Tu-s2gO-pY8LiPcpZoCWFR2sQLCeKH4Tll3QKopa2duYvf88grtvgENe/pub?gid=877598510&single=true&output=csv';

        async function updateDashboard() {
            try {
                const response = await fetch(`${CSV_URL}&cachebust=${Date.now()}`);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/)).slice(1);
                
                const sections = {
                    'In Progress': { html: '', count: 0, id: 'col-progress', counter: 'count-progress' },
                    'On Hold': { html: '', count: 0, id: 'col-hold', counter: 'count-hold' },
                    'Completed': { html: '', count: 0, id: 'col-completed', counter: 'count-completed' }
                };

                rows.forEach(row => {
                    if (row.length < 3) return;
                    const no = row[0].replace(/"/g, '').trim();
                    const title = row[1].replace(/"/g, '').trim();
                    const status = row[2].replace(/"/g, '').trim();
                    const name = (row[3] || "Unassigned").replace(/"/g, '').trim();

                    if (sections[status] && title) {
                        sections[status].count++;
                        sections[status].html += `
                            <div class="glass-card p-6 rounded-2xl shadow-lg border-l-2 border-slate-700 hover:border-strateq-green transition-all duration-300 group">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="text-[9px] font-black text-slate-500 tracking-widest uppercase">Task ID: ${no}</span>
                                    <span class="text-[10px] bg-slate-800 text-blue-300 px-2 py-1 rounded-md font-bold border border-slate-700">${name}</span>
                                </div>
                                <h3 class="text-[15px] font-bold text-white group-hover:text-[#8dc63f] transition-colors leading-tight">${title}</h3>
                            </div>
                        `;
                    }
                });

                Object.values(sections).forEach(sec => {
                    document.getElementById(sec.id).innerHTML = sec.html || '<p class="text-slate-700 italic text-center text-xs py-10">Waiting for tasks...</p>';
                    document.getElementById(sec.counter).innerText = sec.count;
                });

                document.getElementById('sync-status').innerText = "SYSTEM LIVE • UPDATED: " + new Date().toLocaleTimeString();
            } catch (e) {
                document.getElementById('sync-status').innerText = "RECONNECTING...";
            }
        }

        setInterval(updateDashboard, 20000);
        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour12: true, hour: '2-digit', minute: '2-digit', second: '2-digit' }); 
        }, 1000);
        updateDashboard();
    </script>
</body>
</html>
